name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # All three service backends are unit-tested via injected fake runners,
        # so every OS exercises every backend's rendering and dispatch.
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Project runtime target.
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run privacy scan
        run: python scripts/privacy_scan.py --tracked
      - name: Run smoke test
        run: python -m pytest -m smoke
      - name: Run full test suite
        run: python -m pytest
